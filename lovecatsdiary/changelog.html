<style>
:root {
  --primary: #5C8B72; --primary-light: #8FBEA4; --primary-bg: #DCEDE2;
  --bg: #F7F3EE; --bg-card: #FFFFFF; --text: #2C2C2C;
  --text-sub: #6B6B6B; --text-muted: #9A9A9A;
  --radius: 16px; --shadow: 0 4px 24px rgba(0,0,0,0.07);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, "PingFang SC", "Hiragino Sans GB", sans-serif;
  background: var(--bg); color: var(--text); line-height: 1.8;
}
nav {
  position: sticky; top: 0; z-index: 100;
  background: rgba(247,243,238,0.9); backdrop-filter: blur(16px);
  border-bottom: 1px solid rgba(92,139,114,0.12);
  padding: 0 24px; height: 60px;
  display: flex; align-items: center; justify-content: space-between;
}
.nav-brand {
  display: flex; align-items: center; gap: 10px;
  font-weight: 700; font-size: 17px; color: var(--primary);
  text-decoration: none;
}
.nav-icon { width:32px; height:32px; border-radius:8px; background:var(--primary-bg); display:flex; align-items:center; justify-content:center; font-size:18px; }
.nav-back { color:var(--primary); text-decoration:none; font-size:14px; font-weight:500; }
.nav-back:hover { text-decoration:underline; }
.page-header {
  background: linear-gradient(135deg, #EBF4EE 0%, #F7F3EE 100%);
  padding: 60px 24px 40px; text-align: center;
}
.page-header .badge {
  display:inline-block; background:var(--primary-bg); color:var(--primary);
  font-size:13px; font-weight:700; padding:6px 16px; border-radius:40px; margin-bottom:16px;
}
.page-header h1 { font-size:clamp(28px,5vw,42px); font-weight:800; margin-bottom:12px; }
.page-header p { font-size:15px; color:var(--text-sub); }
.content { max-width:760px; margin:0 auto; padding:48px 24px 80px; }
.release-card {
  background:var(--bg-card); border-radius:var(--radius);
  padding:28px 32px; margin-bottom:20px;
  box-shadow:var(--shadow);
}
.release-card h2 {
  font-size:20px; font-weight:800; color:var(--primary);
  margin-bottom:12px; padding-bottom:12px;
  border-bottom:1px solid var(--primary-bg);
}
.release-card p { font-size:15px; color:var(--text-sub); }
.update-date { text-align:center; color:var(--text-muted); font-size:13px; margin-bottom:32px; }
footer {
  background:#1E2420; color:rgba(255,255,255,0.5);
  padding:28px 24px; text-align:center; font-size:13px;
}
footer a { color:rgba(255,255,255,0.55); text-decoration:none; margin:0 8px; }
footer a:hover { color:white; }
</style>
